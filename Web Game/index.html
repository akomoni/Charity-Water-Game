<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="theme-color" content="#2596BE">
    
    <title>Jerry's Water Network - charity: water</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Phaser 3 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    
    <!-- Game Scripts - Order matters! -->
    <script src="src/constants/BrandingConstants.js"></script>
    <script src="src/systems/GameManager.js"></script>
    <script src="src/systems/GridSystem.js"></script>
    <script src="src/systems/PipeManager.js"></script>
    <script src="src/objects/Tile.js"></script>
    <script src="src/objects/WaterParticle.js"></script>
    <script src="src/ui/UIManager.js"></script>
    <script src="src/scenes/BootScene.js"></script>
    <script src="src/scenes/MainMenuScene.js"></script>
    <script src="src/scenes/LevelScene.js"></script>
    <script src="src/scenes/LevelCompleteScene.js"></script>
    <script src="src/scenes/RewardsScene.js"></script>
    <script src="src/Game.js"></script>

    <!-- Debug: Show any loading errors -->
    <script>
        // Only show this if all scripts failed to load
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (typeof Phaser === 'undefined') {
                    alert('Phaser failed to load. Check network tab.');
                } else if (typeof BrandingConstants === 'undefined') {
                    alert('BrandingConstants failed to load.');
                } else if (typeof gameManager === 'undefined') {
                    alert('GameManager failed to load.');
                } else if (typeof window.game === 'undefined') {
                    alert('Game instance failed to create.');
                }
            }, 100);
        });
    </script>
</body>
</html>
